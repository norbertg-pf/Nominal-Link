name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv (Python 3.11)
        run: uv venv --python 3.11

      - name: Install package + dev extras
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run --no-sync pytest -q

      # Ruff is optional: it must not block the suite, so failures are surfaced
      # but do not fail the job.
      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: uv run --no-sync ruff check nominal_link tests
